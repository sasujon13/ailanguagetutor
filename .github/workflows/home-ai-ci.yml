name: Home AI Server CI

on:
  push:
    branches: [main, master]
    paths:
      - "server/v2/**"
      - ".github/workflows/home-ai-ci.yml"
  pull_request:
    paths:
      - "server/v2/**"

defaults:
  run:
    working-directory: server/v2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run router tests
        run: pytest tests/ -v

      - name: Import smoke test
        run: python -c "from app.main import app; print('ok')"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: server/v2
        run: docker build -t cheradip-home-ai .

      - name: Save Docker image artifact
        working-directory: server/v2
        run: docker save cheradip-home-ai | gzip > cheradip-home-ai.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheradip-home-ai-image
          path: server/v2/cheradip-home-ai.tar.gz
          retention-days: 7
